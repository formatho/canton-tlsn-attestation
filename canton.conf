version: "2.6"
canton:
  participants:
    participant1:
      ledger-api:
        address: "0.0.0.0"
        port: 5011
        max-inbound-message-size: 52428800

      admin-api:
        address: "0.0.0.0"
        port: 5012

      storage:
        type: postgres
        config:
          dataSource:
            className: org.postgresql.ds.PGSimpleDataSource
            url: "jdbc:postgresql://localhost:5432/canton"
            user: canton
            password: canton

      tls:
        # Self-signed certificates for development
        # Use production certificates in production
        cert-chain-file: "certs/participant1.pem"
        private-key-file: "certs/participant1-key.pem"
        trust-collection-file: "certs/root-ca.pem"

      parameters:
        # Enable efficient query service
        enable-query-store: true
        # Enable command deduplication
        enable-command-deduplication: true

  domains:
    mydomain:
      public-api:
        address: "0.0.0.0"
        port: 5013

      admin-api:
        address: "0.0.0.0"
        port: 5014

      init:
        domainParameters:
          uniqueContractKeys: true
          maxReassignmentRate: 1000
          # Use Sequencer v2 for better performance
          reassignmentIntervals:
            additional-sequencer-timeout: 60s
            max-batch-size: 50
            batch-aggregation-timeout: 250ms

      tls:
        cert-chain-file: "certs/domain.pem"
        private-key-file: "certs/domain-key.pem"
        trust-collection-file: "certs/root-ca.pem"